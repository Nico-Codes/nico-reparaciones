services:
  postgres:
    image: postgres:16-alpine
    container_name: nico-next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nico_reparaciones_next
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
