name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  next-stack:
    name: Next Stack Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: next-stack/package-lock.json

      - name: Prepare env
        run: |
          cp next-stack/.env.example next-stack/.env

      - name: Install dependencies
        working-directory: next-stack
        run: npm ci

      - name: Env check
        working-directory: next-stack
        run: npm run env:check

      - name: Typecheck API
        working-directory: next-stack
        run: npm run typecheck --workspace @nico/api

      - name: Typecheck Web
        working-directory: next-stack
        run: npm run typecheck --workspace @nico/web

      - name: Build API
        working-directory: next-stack
        run: npm run build --workspace @nico/api

      - name: Build Web
        working-directory: next-stack
        run: npm run build --workspace @nico/web

      - name: Tests
        working-directory: next-stack
        run: npm run test

      - name: Smoke backend
        working-directory: next-stack
        run: npm run smoke:backend

      - name: Smoke web
        working-directory: next-stack
        run: npm run smoke:web

      - name: Route parity
        working-directory: next-stack
        run: npm run qa:route-parity

      - name: Legacy detach
        working-directory: next-stack
        run: npm run qa:legacy:detach
